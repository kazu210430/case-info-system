name: CI Tests

on:
  push:
  pull_request:

jobs:
  pure-tests:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore pure test project
        run: dotnet restore .\dev\CaseInfoSystem.Tests\CaseInfoSystem.Tests.csproj

      - name: Build pure test project
        run: dotnet build .\dev\CaseInfoSystem.Tests\CaseInfoSystem.Tests.csproj -c Release --no-restore

      - name: Run pure tests
        run: dotnet test .\dev\CaseInfoSystem.Tests\CaseInfoSystem.Tests.csproj -c Release --no-build
