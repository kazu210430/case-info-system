name: CI Build and Test

on:
  push:
  pull_request:

jobs:
  solution-build-and-test:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        # CI is limited to restore/compile/test. It does not validate deployable VSTO output.
        # Run restore as part of the same MSBuild invocation so the solution is evaluated on the
        # same build path that actually compiles the Excel/Word Add-in projects.
        # Skip manifest signing here because certificate-store-dependent release signing is outside
        # this CI's scope; the goal is to catch product compile/build breakage, not packaging setup.
        run: msbuild .\dev\CaseInfoSystem.slnx /restore /t:Build /p:Configuration=Release /p:SignManifests=false /p:ManifestCertificateThumbprint= /m

      - name: Run tests
        run: dotnet test .\dev\CaseInfoSystem.Tests\CaseInfoSystem.Tests.csproj -c Release --no-build --no-restore
