name: CI Build and Test

on:
  push:
  pull_request:

jobs:
  solution-build-and-test:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build solution
        # CI is limited to compile/test. It intentionally does not validate deployable VSTO output
        # or runtime Addins reflection. The standard wrapper keeps this entrypoint aligned with local use.
        run: powershell -ExecutionPolicy Bypass -File .\build.ps1 -Mode Compile

      - name: Run tests
        run: powershell -ExecutionPolicy Bypass -File .\build.ps1 -Mode Test -Configuration Release -NoBuild -NoRestore
